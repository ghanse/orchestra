name: skill-eval

on:
  pull_request:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen

      # Azure login for live ADF integration tests.
      # Requires AZURE_CREDENTIALS secret configured with a service principal
      # that has Reader access to the ghansen-orchestra-rg resource group.
      # Tests skip gracefully when credentials are not available.
      - name: Azure Login
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - run: make integration
